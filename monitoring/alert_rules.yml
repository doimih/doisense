groups:
  - name: doisense-ops
    rules:
      - alert: HostHighCPU
        expr: avg by(instance) (rate(node_cpu_seconds_total{mode!="idle"}[5m])) > 0.85
        for: 10m
        labels:
          severity: high
        annotations:
          summary: High CPU usage on host
          description: CPU usage has been above 85% for at least 10 minutes.

      - alert: HostHighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 10m
        labels:
          severity: high
        annotations:
          summary: High memory usage on host
          description: Memory usage has been above 90% for at least 10 minutes.

      - alert: PostgresExporterDown
        expr: up{job="postgres"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Postgres exporter is down
          description: Prometheus cannot scrape postgres-exporter for more than 2 minutes.

      - alert: RedisExporterDown
        expr: up{job="redis"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Redis exporter is down
          description: Prometheus cannot scrape redis-exporter for more than 2 minutes.

      - alert: ContainerRestartingFrequently
        expr: increase(container_start_time_seconds[15m]) > 2
        for: 5m
        labels:
          severity: high
        annotations:
          summary: Container restarting frequently
          description: A container appears to have restarted repeatedly in the last 15 minutes.
