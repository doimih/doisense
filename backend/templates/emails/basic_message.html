<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f5f7f9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #15202b;
      }
      .wrap {
        width: 100%;
        padding: 24px 12px;
      }
      .card {
        max-width: 640px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #d8e1e8;
        border-radius: 12px;
        overflow: hidden;
      }
      .head {
        background: #0f766e;
        color: #ffffff;
        padding: 18px 20px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .body {
        padding: 20px;
        line-height: 1.55;
        font-size: 15px;
      }
      .cta-wrap {
        margin: 22px 0;
      }
      .cta {
        display: inline-block;
        background: #0f766e;
        color: #ffffff !important;
        text-decoration: none;
        padding: 11px 16px;
        border-radius: 8px;
        font-weight: 600;
      }
      .foot {
        padding: 16px 20px;
        border-top: 1px solid #e6edf2;
        font-size: 12px;
        color: #617282;
      }
      a {
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="head">Doisense</div>
        <div class="body">
          <h1 style="margin-top: 0; font-size: 20px;">{{ title }}</h1>
          <div>{{ body_text|linebreaksbr }}</div>
          {% if action_url %}
            <div class="cta-wrap">
              <a class="cta" href="{{ action_url }}">{{ action_label }}</a>
            </div>
            <div style="font-size: 13px; color: #4b5b67;">
              If the button does not work, open this link:<br />
              <a href="{{ action_url }}">{{ action_url }}</a>
            </div>
          {% endif %}
        </div>
        <div class="foot">
          You are receiving this message because you have an account or activity on Doisense.
        </div>
      </div>
    </div>
  </body>
</html>
