<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }}</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #f6f7f9;
        color: #111827;
        margin: 0;
        padding: 0;
      }
      .wrap {
        max-width: 900px;
        margin: 32px auto;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 24px;
      }
      .meta {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 12px;
      }
      .content {
        line-height: 1.65;
      }
      .content img {
        max-width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>{{ page.title }}</h1>
      <div class="meta">Slug: {{ page.slug }} | Language: {{ page.language }}</div>
      <article class="content">{{ page.content|safe }}</article>
    </main>
  </body>
</html>
