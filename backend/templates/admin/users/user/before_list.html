{% if user_stats %}
<div class="grid grid-cols-2 gap-3 mb-6 sm:grid-cols-4">
  <div class="rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-base-700 dark:bg-base-900">
    <p class="text-xs font-medium text-stone-500 dark:text-stone-400">Total utilizatori</p>
    <p class="mt-1 text-3xl font-bold text-stone-900 dark:text-white">{{ user_stats.total }}</p>
  </div>
  <div class="rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-base-700 dark:bg-base-900">
    <p class="text-xs font-medium text-stone-500 dark:text-stone-400">Utilizatori activi</p>
    <p class="mt-1 text-3xl font-bold text-teal-600">{{ user_stats.active }}</p>
  </div>
  <div class="rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-base-700 dark:bg-base-900">
    <p class="text-xs font-medium text-stone-500 dark:text-stone-400">Administratori</p>
    <p class="mt-1 text-3xl font-bold text-violet-600">{{ user_stats.admins }}</p>
  </div>
  <div class="rounded-2xl border border-stone-200 bg-white p-4 shadow-sm dark:border-base-700 dark:bg-base-900">
    <p class="text-xs font-medium text-stone-500 dark:text-stone-400">Premium</p>
    <p class="mt-1 text-3xl font-bold text-amber-500">{{ user_stats.premium }}</p>
  </div>
</div>
{% endif %}
