{% extends "admin/change_form.html" %}

{% block extrahead %}
{{ block.super }}
<style>
  .admin-section-tabs {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0;
    margin: 0 0 18px;
    padding: 10px 14px;
    border: 1px solid rgba(14, 116, 144, 0.12);
    border-radius: 14px;
    background:
      linear-gradient(135deg, rgba(236, 253, 245, 0.95), rgba(239, 246, 255, 0.95) 50%, rgba(255, 247, 237, 0.95));
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
  }

  .admin-section-tab {
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: #475569;
    padding: 6px 0;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
    transition: color 0.18s ease, transform 0.18s ease, text-shadow 0.18s ease;
  }

  .admin-section-tab:hover {
    color: #0f766e;
    transform: translateY(-1px);
  }

  .admin-section-tab + .admin-section-tab::before {
    content: '|';
    color: #94a3b8;
    margin: 0 12px;
    text-shadow: none;
  }

  .admin-section-tab__label {
    display: inline-block;
  }

  .admin-section-tab.is-active {
    color: #0f172a;
    text-shadow: 0 0 0 rgba(15, 23, 42, 0.01);
  }

  .admin-section-tab.is-active .admin-section-tab__label::after {
    content: '';
    display: block;
    width: 100%;
    height: 3px;
    margin-top: 6px;
    border-radius: 999px;
    background: linear-gradient(90deg, #0f766e, #0284c7, #f97316);
  }

  @media (max-width: 640px) {
    .admin-section-tabs {
      padding: 10px 12px;
    }

    .admin-section-tab {
      font-size: 13px;
    }

    .admin-section-tab + .admin-section-tab::before {
      margin: 0 8px;
    }
  }
</style>
{% block tabbed_extrahead %}{% endblock %}
{% endblock %}

{% block admin_change_form_document_ready %}
{{ block.super }}
<script>
(() => {
  const key = `doisense-admin-tab:${window.location.pathname}`
  const form = document.querySelector('form[id$="_form"]')
  if (!form) return

  const fieldsets = Array.from(form.querySelectorAll('fieldset')).filter((fieldset) => {
    const heading = fieldset.querySelector('h2, legend')
    const label = heading?.textContent?.trim()
    return Boolean(label)
  })
  if (fieldsets.length < 2) return

  const tabs = document.createElement('div')
  tabs.className = 'admin-section-tabs'

  const items = fieldsets.map((fieldset, index) => {
    const heading = fieldset.querySelector('h2, legend')
    const label = heading?.textContent?.trim() || `Section ${index + 1}`
    const id = fieldset.id || `admin-section-tab-${index}`

    const button = document.createElement('button')
    button.type = 'button'
    button.className = 'admin-section-tab'
    button.dataset.target = id

    const labelSpan = document.createElement('span')
    labelSpan.className = 'admin-section-tab__label'
    labelSpan.textContent = label
    button.appendChild(labelSpan)

    fieldset.id = id
    tabs.appendChild(button)

    return { fieldset, button, id }
  })

  const tabsContainer = items[0].fieldset.parentNode
  if (!tabsContainer) return
  tabsContainer.insertBefore(tabs, items[0].fieldset)

  function setActive(id) {
    items.forEach(({ fieldset, button, id: itemId }) => {
      const active = itemId === id
      fieldset.style.display = active ? '' : 'none'
      button.classList.toggle('is-active', active)
      button.setAttribute('aria-pressed', active ? 'true' : 'false')
    })
    try {
      localStorage.setItem(key, id)
    } catch {
      // Ignore storage errors.
    }
  }

  let initial = items[0].id
  try {
    const remembered = localStorage.getItem(key)
    if (remembered && items.some((item) => item.id === remembered)) {
      initial = remembered
    }
  } catch {
    // Ignore storage errors.
  }

  items.forEach(({ button, id }) => {
    button.addEventListener('click', () => setActive(id))
  })

  setActive(initial)
})()
</script>
{% block tabbed_scripts %}{% endblock %}
{% endblock %}
