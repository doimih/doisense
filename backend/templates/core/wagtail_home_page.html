<!DOCTYPE html>
{% load wagtailcore_tags %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} - Doisense</title>
</head>
<body>
  <main style="max-width: 860px; margin: 2rem auto; font-family: sans-serif; line-height: 1.6; padding: 0 1rem;">
    <h1>{{ page.title }}</h1>
    {% if page.intro %}
      <section>{{ page.intro|richtext }}</section>
    {% else %}
      <p>Welcome to Wagtail on Doisense. You can edit this page in Wagtail Admin.</p>
    {% endif %}
  </main>
</body>
</html>
