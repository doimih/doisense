[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
addopts = -v --tb=short --cov=. --cov-report=xml --cov-report=html --cov-report=term-missing --cov-fail-under=75
filterwarnings = ignore::DeprecationWarning
	ignore:urllib3 .* doesn't match a supported version!.*:Warning

[coverage:run]
omit =
	*/migrations/*
	*/tests/*
	*/test_*.py
	setup.py
	manage.py
	conftest.py
	__pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
	pragma: no cover
	def __repr__
	raise AssertionError
	raise NotImplementedError
	if __name__ == .__main__.:
	if TYPE_CHECKING:
	@abstractmethod
	@abc.abstractmethod
