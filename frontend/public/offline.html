<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doisense - Offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top right, #d8f3f0 0%, #f3f5f8 42%, #edf1f6 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #1e293b;
      }

      .card {
        width: min(92vw, 520px);
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #cbd5e1;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.55;
        color: #334155;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        border-radius: 10px;
        padding: 10px 14px;
        background: #0f766e;
        color: #fff;
        font-weight: 600;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: #e2e8f0;
        color: #1e293b;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 id="offline-title">You are offline</h1>
      <p id="offline-description">
        Doisense cannot reach the network right now. You can retry when your connection is restored.
      </p>
      <div class="actions">
        <button id="retry-btn" type="button">Retry now</button>
        <a id="return-link" href="/doisense/">Return to Doisense</a>
      </div>
    </main>

    <script>
      const SUPPORTED_LANGUAGES = ["ro", "en", "de", "fr", "it", "es", "pl"];
      const COPY = {
        ro: {
          pageTitle: "Doisense - Offline",
          title: "Esti offline",
          description: "Doisense nu poate ajunge acum la retea. Poti reincerca imediat ce conexiunea revine.",
          retry: "Incearca din nou",
          returnHome: "Inapoi la Doisense",
        },
        en: {
          pageTitle: "Doisense - Offline",
          title: "You are offline",
          description: "Doisense cannot reach the network right now. You can retry when your connection is restored.",
          retry: "Retry now",
          returnHome: "Return to Doisense",
        },
        de: {
          pageTitle: "Doisense - Offline",
          title: "Du bist offline",
          description: "Doisense kann das Netzwerk gerade nicht erreichen. Du kannst es erneut versuchen, sobald die Verbindung wieder da ist.",
          retry: "Erneut versuchen",
          returnHome: "Zuruck zu Doisense",
        },
        fr: {
          pageTitle: "Doisense - Hors ligne",
          title: "Vous etes hors ligne",
          description: "Doisense ne peut pas acceder au reseau pour le moment. Vous pouvez reessayer des que la connexion revient.",
          retry: "Reessayer",
          returnHome: "Retour a Doisense",
        },
        it: {
          pageTitle: "Doisense - Offline",
          title: "Sei offline",
          description: "Doisense non riesce a raggiungere la rete in questo momento. Puoi riprovare quando la connessione torna disponibile.",
          retry: "Riprova ora",
          returnHome: "Torna a Doisense",
        },
        es: {
          pageTitle: "Doisense - Sin conexion",
          title: "Estas sin conexion",
          description: "Doisense no puede conectarse a la red ahora mismo. Puedes volver a intentarlo cuando se restablezca la conexion.",
          retry: "Reintentar",
          returnHome: "Volver a Doisense",
        },
        pl: {
          pageTitle: "Doisense - Offline",
          title: "Jestes offline",
          description: "Doisense nie moze teraz polaczyc sie z siecia. Sprobuj ponownie, gdy polaczenie zostanie przywrocone.",
          retry: "Sprobuj ponownie",
          returnHome: "Wroc do Doisense",
        },
      };

      function normalizeLanguage(value) {
        if (!value) return "en";
        const candidate = String(value).trim().toLowerCase().replace("_", "-");
        const code = candidate.split(",", 1)[0].split(";", 1)[0].split("-", 1)[0];
        return SUPPORTED_LANGUAGES.includes(code) ? code : "en";
      }

      function detectLanguage() {
        const cookieMatch = document.cookie.match(/(?:^|; )i18n_redirect=([^;]+)/);
        if (cookieMatch?.[1]) return normalizeLanguage(decodeURIComponent(cookieMatch[1]));
        if (navigator.languages?.length) return normalizeLanguage(navigator.languages[0]);
        return normalizeLanguage(navigator.language);
      }

      function applyCopy() {
        const language = detectLanguage();
        const copy = COPY[language] || COPY.en;
        document.documentElement.lang = language;
        document.title = copy.pageTitle;
        document.getElementById("offline-title").textContent = copy.title;
        document.getElementById("offline-description").textContent = copy.description;
        document.getElementById("retry-btn").textContent = copy.retry;
        document.getElementById("return-link").textContent = copy.returnHome;
      }

      async function clearSwAndCaches() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }
      }

      async function recover() {
        if (!navigator.onLine) {
          window.location.reload();
          return;
        }

        await clearSwAndCaches();
        window.location.href = "/doisense/";
      }

  applyCopy();
      document.getElementById("retry-btn")?.addEventListener("click", recover);

      // Auto-heal stale service worker situations when connectivity exists.
      if (navigator.onLine) {
        recover();
      }
    </script>
  </body>
</html>
