[phases.setup]
nixPkgs = ["nodejs_20", "python3", "pkg-config", "gcc", "gnumake", "curl", "xz"]

[phases.install]
cmds = [
  "mkdir -p /opt/node20 && curl -fsSL https://nodejs.org/dist/v20.19.0/node-v20.19.0-linux-x64.tar.xz -o /tmp/node20.tar.xz && tar -xJf /tmp/node20.tar.xz -C /opt/node20 --strip-components=1 && PATH=/opt/node20/bin:$PATH /opt/node20/bin/node -v && PATH=/opt/node20/bin:$PATH /opt/node20/bin/node /opt/node20/lib/node_modules/corepack/dist/corepack.js pnpm install --frozen-lockfile --prod=false --no-optional=false"
]

[phases.build]
cmds = ["PATH=/opt/node20/bin:$PATH /opt/node20/bin/node /opt/node20/lib/node_modules/corepack/dist/corepack.js pnpm run build"]

[start]
cmd = "PATH=/opt/node20/bin:$PATH /opt/node20/bin/node /opt/node20/lib/node_modules/corepack/dist/corepack.js pnpm run start"
