# Doisense – doar serviciile acestui proiect.
# Traefik rulează pe host; acest compose adaugă doar rute pentru doisense (labels).
# Nu modificați configurația globală Traefik a serverului.
#
# IMPORTANT: Ca Traefik să vadă containerele, frontend și backend trebuie pe același
# network cu Traefik. Setează TRAEFIK_NETWORK în .env (ex: dokploy-network).

services:
  db:
    build:
      context: ./docker/db
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    environment:
      POSTGRES_USER: doisense
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-db-password}
      POSTGRES_DB: doisense
    volumes:
      - doisense_pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - app_internal
      - backup_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doisense"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    expose:
      - "6379"
    networks:
      - app_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    tmpfs:
      - /tmp
    volumes:
      - doisense_media:/app/media
    expose:
      - "8000"
    networks:
      - app_internal
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; req = urllib.request.Request('http://localhost:8000/api/health', headers={'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(req, timeout=5)\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      DATABASE_URL: postgres://doisense:${POSTGRES_PASSWORD:-change-me-db-password}@db:5432/doisense
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-with-at-least-32-characters}
      PUBLIC_PATH_PREFIX: ${PUBLIC_PATH_PREFIX:-}
      ADMIN_SITE_URL: ${ADMIN_SITE_URL:-https://www.doisense.eu}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://www.doisense.eu}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,www.doisense.eu,doisense.eu}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://www.doisense.eu,https://doisense.eu}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://www.doisense.eu,https://doisense.eu}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRODUCT_ID_BASIC: ${STRIPE_PRODUCT_ID_BASIC:-}
      STRIPE_PRODUCT_ID_PREMIUM: ${STRIPE_PRODUCT_ID_PREMIUM:-}
      STRIPE_PRODUCT_ID_VIP: ${STRIPE_PRODUCT_ID_VIP:-}
      STRIPE_PRICE_ID_PREMIUM: ${STRIPE_PRICE_ID_PREMIUM:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    labels:
      # Rute Traefik doar pentru doisense – nu afectează alte proiecte
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-dokploy-network}"
      - "traefik.http.routers.doisense-api.rule=${TRAEFIK_API_RULE:-(Host(`www.doisense.eu`) || Host(`doisense.eu`))&&PathPrefix(`/api`)}"
      - "traefik.http.routers.doisense-api.entrypoints=websecure"
      - "traefik.http.routers.doisense-api.tls=true"
      - "traefik.http.routers.doisense-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.doisense-api.priority=220"
      - "traefik.http.routers.doisense-api.service=doisense-api"
      - "traefik.http.routers.doisense-admin.rule=${TRAEFIK_ADMIN_RULE:-(Host(`www.doisense.eu`) || Host(`doisense.eu`))&&(PathPrefix(`/admin`) || PathPrefix(`/ro/admin`))}"
      - "traefik.http.routers.doisense-admin.entrypoints=websecure"
      - "traefik.http.routers.doisense-admin.tls=true"
      - "traefik.http.routers.doisense-admin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.doisense-admin.priority=200"
      - "traefik.http.routers.doisense-admin.service=doisense-api"
      - "traefik.http.routers.doisense-media.rule=${TRAEFIK_MEDIA_RULE:-(Host(`www.doisense.eu`) || Host(`doisense.eu`))&&PathPrefix(`/media`)}"
      - "traefik.http.routers.doisense-media.entrypoints=websecure"
      - "traefik.http.routers.doisense-media.tls=true"
      - "traefik.http.routers.doisense-media.tls.certresolver=letsencrypt"
      - "traefik.http.routers.doisense-media.priority=205"
      - "traefik.http.routers.doisense-media.service=doisense-api"
      - "traefik.http.services.doisense-api.loadbalancer.server.port=8000"
      # Strip prefix ca backend-ul să primească /api/...
      - "traefik.http.middlewares.doisense-api-stripprefix.stripprefix.prefixes=${TRAEFIK_API_STRIP_PREFIXES:-}"
      - "traefik.http.routers.doisense-api.middlewares=doisense-api-stripprefix@docker"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_APP_BASE_URL: ${NUXT_PUBLIC_APP_BASE_URL:-/}
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://www.doisense.eu}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    tmpfs:
      - /tmp
    expose:
      - "3000"
    networks:
      - app_internal
      - traefik
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000${FRONTEND_HEALTHCHECK_PATH:-/}').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      NUXT_PUBLIC_APP_BASE_URL: ${NUXT_PUBLIC_APP_BASE_URL:-/}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://www.doisense.eu}
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-/api}
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${NUXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-dokploy-network}"
      - "traefik.http.middlewares.doisense-legacy-prefix.redirectregex.regex=^https?://([^/]+)/doisense/(.*)"
      - "traefik.http.middlewares.doisense-legacy-prefix.redirectregex.replacement=https://$${1}/$${2}"
      - "traefik.http.middlewares.doisense-legacy-prefix.redirectregex.permanent=true"
      - "traefik.http.routers.doisense-legacy.rule=(Host(`www.doisense.eu`) || Host(`doisense.eu`))&&PathPrefix(`/doisense/`)"
      - "traefik.http.routers.doisense-legacy.entrypoints=websecure"
      - "traefik.http.routers.doisense-legacy.tls=true"
      - "traefik.http.routers.doisense-legacy.tls.certresolver=letsencrypt"
      - "traefik.http.routers.doisense-legacy.priority=400"
      - "traefik.http.routers.doisense-legacy.middlewares=doisense-legacy-prefix@docker"
      - "traefik.http.routers.doisense-legacy.service=doisense-web"
      - "traefik.http.routers.doisense-web.rule=${TRAEFIK_WEB_RULE:-(Host(`www.doisense.eu`) || Host(`doisense.eu`))}"
      - "traefik.http.routers.doisense-web.entrypoints=websecure"
      - "traefik.http.routers.doisense-web.tls=true"
      - "traefik.http.routers.doisense-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.doisense-web.tls.domains[0].main=www.doisense.eu"
      - "traefik.http.routers.doisense-web.tls.domains[0].sans=doisense.eu"
      - "traefik.http.routers.doisense-web.priority=150"
      - "traefik.http.routers.doisense-web.service=doisense-web"
      - "traefik.http.services.doisense-web.loadbalancer.server.port=3000"
      # Nu strip prefix – Nuxt servește cu baseURL /doisense

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-doisense-backup}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
    volumes:
      - doisense_backup_data:/data
    expose:
      - "9000"
      - "9001"
    networks:
      - backup_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    read_only: true
    environment:
      MC_CONFIG_DIR: /tmp/.mc
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-doisense-backup}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-minio-password}
      MINIO_BACKUP_BUCKET: ${MINIO_BACKUP_BUCKET:-doisense-backup}
    tmpfs:
      - /tmp
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - "mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" && mc mb --ignore-existing \"local/$$MINIO_BACKUP_BUCKET\" && mc anonymous set private \"local/$$MINIO_BACKUP_BUCKET\" || true"
    networks:
      - backup_internal

networks:
  app_internal:
    name: ${APP_INTERNAL_NETWORK:-doisense_app_internal}
    internal: true
  backup_internal:
    name: ${BACKUP_INTERNAL_NETWORK:-doisense_backup_internal}
    internal: true
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-dokploy-network}
volumes:
  doisense_pgdata:
  doisense_media:
  doisense_backup_data:
