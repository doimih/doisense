name: CD Development

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, or commit SHA)"
        required: true
        default: "dev"
      run_migrations:
        description: "Run backend migrations after deploy"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Resolve ref to commit SHA
        id: resolve_ref
        env:
          REF_TO_DEPLOY: ${{ github.event.inputs.ref }}
        run: |
          set -Eeuo pipefail
          git fetch origin dev --tags --prune
          if git show-ref --verify --quiet "refs/remotes/origin/${REF_TO_DEPLOY}"; then
            RESOLVED_SHA="$(git rev-parse "origin/${REF_TO_DEPLOY}^{commit}")"
          else
            RESOLVED_SHA="$(git rev-parse "${REF_TO_DEPLOY}^{commit}")"
          fi

          if ! git branch -r --contains "$RESOLVED_SHA" | grep -q "origin/dev"; then
            echo "Selected ref does not belong to origin/dev"
            exit 1
          fi

          echo "resolved_sha=${RESOLVED_SHA}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${REF_TO_DEPLOY} to ${RESOLVED_SHA}"

      - name: Verify CI succeeded for selected commit
        uses: actions/github-script@v7.0.1
        env:
          TARGET_SHA: ${{ steps.resolve_ref.outputs.resolved_sha }}
        with:
          script: |
            const workflowId = 'ci.yml';
            const targetSha = process.env.TARGET_SHA;

            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              head_sha: targetSha,
              per_page: 50,
            });

            const successfulRun = runs.data.workflow_runs.find(
              (run) => run.status === 'completed' && run.conclusion === 'success'
            );

            if (!successfulRun) {
              core.setFailed(
                `No successful CI run found for commit ${targetSha}. Run CI first and retry deployment.`
              );
              return;
            }

            core.info(`CI gate passed with run #${successfulRun.run_number}: ${successfulRun.html_url}`);

      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e
          for v in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH; do
            if [ -z "${!v}" ]; then
              echo "Missing required secret: $v"
              exit 1
            fi
          done

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          REF_TO_DEPLOY: ${{ steps.resolve_ref.outputs.resolved_sha }}
          RUN_MIGRATIONS: ${{ github.event.inputs.run_migrations }}
        run: |
          ssh "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "REF_TO_DEPLOY='${REF_TO_DEPLOY}' RUN_MIGRATIONS='${RUN_MIGRATIONS}' bash -s" << 'EOF'
          set -Eeuo pipefail
          cd "${{ secrets.DEPLOY_PATH }}"
          git fetch --all --tags --prune
          git checkout --detach "$REF_TO_DEPLOY"
          bash scripts/site/rebuild_all.sh
          if [ "$RUN_MIGRATIONS" = "true" ]; then
            docker compose run --rm backend python manage.py migrate
          fi
          
          # Post-deploy health checks
          echo "=== Waiting for services to be healthy ==="
          for i in {1..30}; do
            # Check backend
            if curl -f -s -H "X-Forwarded-Proto: https" http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "✓ Backend is healthy"
            else
              echo "Attempt $i: Backend not ready, retrying..."
              sleep 2
              continue
            fi
            
            # Check frontend
            if curl -f -s http://localhost:3000/doisense/ > /dev/null 2>&1; then
              echo "✓ Frontend is healthy"
            else
              echo "Attempt $i: Frontend not ready, retrying..."
              sleep 2
              continue
            fi
            
            # Check DB
            if docker compose exec -T db pg_isready -U doisense > /dev/null 2>&1; then
              echo "✓ Database is healthy"
            else
              echo "Attempt $i: Database not ready, retrying..."
              sleep 2
              continue
            fi
            
            # All checks passed
            echo "=== All services are healthy ==="
            exit 0
          done
          
          echo "ERROR: Services failed to become healthy after deploy"
          echo "Current container status:"
          docker compose ps
          exit 1
          EOF