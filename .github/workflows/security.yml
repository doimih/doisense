name: Security Scan

on:
  push:
    branches: [main, dev, prod]
  pull_request:
    branches: [main, dev, prod]
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write

jobs:
  dependencies:
    name: Audit Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Audit Python Dependencies (pip-audit)
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          cd backend
          pip-audit -r requirements.txt --desc

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Audit NPM Dependencies (npm-audit)
        continue-on-error: true
        run: |
          cd frontend
          pnpm audit --audit-level=moderate

  container-scan:
    name: Scan Container Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - { path: backend/Dockerfile, context: backend, image-name: doisense-backend }
          - { path: frontend/Dockerfile, context: frontend, image-name: doisense-frontend }

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Build Docker image
        uses: docker/build-push-action@v5.0.0
        with:
          context: ${{ matrix.dockerfile.context }}
          file: ${{ matrix.dockerfile.path }}
          push: false
          load: true
          tags: ${{ matrix.dockerfile.image-name }}:latest

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ matrix.dockerfile.image-name }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2.22.12
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.dockerfile.image-name }}

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      matrix:
        language: [javascript, python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2.22.12
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Build (Python)
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.txt

      - name: Build (JavaScript)
        if: matrix.language == 'javascript'
        run: |
          cd frontend
          npm install -g pnpm@9
          pnpm install --frozen-lockfile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2.22.12
        with:
          category: /language:${{ matrix.language }}

  secrets-scan:
    name: Scan for Secret Leaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0

      - name: Truffelhog Secret Scan (Pull Request)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.94.1
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: Truffelhog Secret Scan (Push/Schedule)
        if: github.event_name != 'pull_request'
        uses: trufflesecurity/trufflehog@v3.94.1
        with:
          path: ./
          extra_args: --debug --only-verified
