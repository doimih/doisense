name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Lint + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: doisense
          POSTGRES_PASSWORD: ci-db-password
          POSTGRES_DB: doisense_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ci-secret-key
      DEBUG: "false"
      DATABASE_URL: postgres://doisense:ci-db-password@localhost:5432/doisense_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff
        run: ruff check .

      - name: Black check
        run: black --check .

      - name: Pytest with Coverage
        run: pytest --cov --cov-report=xml --cov-fail-under=0

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3.1.5
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    name: Frontend Lint + Tests + Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NUXT_PUBLIC_APP_BASE_URL: /doisense/
      NUXT_PUBLIC_API_BASE: http://localhost:8000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.7

      - name: Setup Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Prepare Nuxt
        run: pnpm exec nuxt prepare

      - name: Test with Coverage
        run: pnpm exec jest --runInBand --coverage --coverageReporters=cobertura --passWithNoTests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3.1.5
        with:
          files: ./frontend/coverage/cobertura-coverage.xml
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        run: pnpm run build