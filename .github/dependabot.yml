version: 2
updates:
  # Python dependencies via pip
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "doimih"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    allow:
      - dependency-type: "production"
      - dependency-type: "development"

  # Node.js dependencies via npm and pnpm
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "doimih"
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    allow:
      - dependency-type: "production"
      - dependency-type: "development"
    # Ignore minor and patch updates for peer dependencies
    ignore:
      - dependency-name: "pnpm"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 3
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "doimih"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(actions):"
      include: "scope"

  # Docker (for base images in Dockerfiles)
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    open-pull-requests-limit: 3
    pull-request-branch-name:
      separator: "/"
    reviewers:
      - "doimih"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(docker):"
      include: "scope"
